name: Task 3 - Pull and Run Docker Image

on:
  workflow_dispatch:

jobs:
  pull-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull Docker image
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/ubuntu-dev-cli:latest

      - name: Run container and print versions
        run: |
          docker run --rm ${{ secrets.DOCKERHUB_USERNAME }}/ubuntu-dev-cli:latest bash -c "
            echo 'Python version:'
            python3 --version

            echo 'PowerShell version:'
            pwsh --version

            echo '.NET CLI version:'
            dotnet --version
          "
